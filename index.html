<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>Skyline AR</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --color-bg: #0a0a0f;
      --color-surface: rgba(16, 16, 28, 0.85);
      --color-surface-light: rgba(255, 255, 255, 0.07);
      --color-border: rgba(255, 255, 255, 0.12);
      --color-accent: #5b8fff;
      --color-accent-dim: rgba(91, 143, 255, 0.18);
      --color-text-primary: #f0f0f5;
      --color-text-secondary: rgba(240, 240, 245, 0.55);
      --color-text-muted: rgba(240, 240, 245, 0.3);
      --color-tag-bg: rgba(91, 143, 255, 0.15);
      --radius-sm: 8px;
      --radius-md: 14px;
      --radius-lg: 20px;
      --font: -apple-system, BlinkMacSystemFont, 'SF Pro Display', 'Segoe UI', sans-serif;
    }

    html, body {
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: var(--color-bg);
      font-family: var(--font);
      color: var(--color-text-primary);
      -webkit-font-smoothing: antialiased;
    }

    /* ── Camera layer ── */
    #camera-feed {
      position: fixed;
      inset: 0;
      width: 100%;
      height: 100%;
      object-fit: cover;
      z-index: 0;
    }

    #camera-placeholder {
      position: fixed;
      inset: 0;
      z-index: 0;
      overflow: hidden;
    }

    #bg-photo {
      width: 100%;
      height: 100%;
      object-fit: cover;
      object-position: center;
    }

    /* ── AR scan grid overlay ── */
    #ar-grid {
      position: fixed;
      inset: 0;
      z-index: 1;
      pointer-events: none;
      background-image:
        linear-gradient(rgba(91, 143, 255, 0.04) 1px, transparent 1px),
        linear-gradient(90deg, rgba(91, 143, 255, 0.04) 1px, transparent 1px);
      background-size: 60px 60px;
      mask-image: radial-gradient(ellipse 80% 60% at 50% 40%, black 0%, transparent 100%);
    }

    /* ── AR building pins ── */
    #ar-layer {
      position: fixed;
      inset: 0;
      z-index: 2;
      pointer-events: none;
    }

    .ar-pin {
      position: absolute;
      transform: translate(-50%, -100%);
      pointer-events: all;
      cursor: pointer;
      transition: transform 0.2s ease;
    }

    .ar-pin:active { transform: translate(-50%, -100%) scale(0.95); }

    .ar-pin-label {
      pointer-events: all;
    }

    .ar-pin-dot {
      pointer-events: all;
      width: 10px;
      height: 10px;
      background: var(--color-accent);
      border-radius: 50%;
      margin: 0 auto;
      box-shadow: 0 0 0 3px rgba(91, 143, 255, 0.3), 0 0 16px rgba(91, 143, 255, 0.5);
      animation: pinPulse 2.4s ease-in-out infinite;
    }

    @keyframes pinPulse {
      0%, 100% { box-shadow: 0 0 0 3px rgba(91,143,255,0.3), 0 0 16px rgba(91,143,255,0.5); }
      50%       { box-shadow: 0 0 0 6px rgba(91,143,255,0.15), 0 0 28px rgba(91,143,255,0.7); }
    }

    .ar-pin-stem {
      width: 1px;
      height: 28px;
      background: linear-gradient(to bottom, var(--color-accent), transparent);
      margin: 0 auto;
    }

    .ar-pin-label {
      background: var(--color-surface);
      border: 1px solid var(--color-border);
      border-radius: var(--radius-sm);
      padding: 5px 14px;
      white-space: nowrap;
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      margin-bottom: 0;
    }

    .ar-pin-name {
      font-size: 13px;
      font-weight: 700;
      letter-spacing: 0.02em;
      color: var(--color-text-primary);
    }

    .ar-pin-height {
      font-size: 12px;
      font-weight: 700;
      color: var(--color-accent);
      margin-top: 1px;
    }

    /* ── Status Bar ── */
    #status-bar {
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      z-index: 10;
      padding: 14px 20px 10px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      background: linear-gradient(to bottom, rgba(10,10,20,0.85) 0%, transparent 100%);
    }

    .status-left {
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .app-logo {
      font-size: 26px;
      font-weight: 700;
      letter-spacing: -0.5px;
      color: var(--color-text-primary);
    }

    .app-logo span {
      color: var(--color-accent);
    }

    .location-badge {
      display: flex;
      align-items: center;
      gap: 6px;
      background: var(--color-surface-light);
      border: 1px solid var(--color-border);
      border-radius: 20px;
      padding: 6px 14px;
      font-size: 13px;
      font-weight: 600;
      color: var(--color-text-secondary);
      backdrop-filter: blur(8px);
      -webkit-backdrop-filter: blur(8px);
    }

    .location-dot {
      width: 8px;
      height: 8px;
      background: #4eff91;
      border-radius: 50%;
      animation: locBlink 2s infinite;
    }

    @keyframes locBlink {
      0%, 90%, 100% { opacity: 1; }
      45% { opacity: 0.3; }
    }

    .status-right {
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .icon-btn {
      width: 34px;
      height: 34px;
      background: var(--color-surface-light);
      border: 1px solid var(--color-border);
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      backdrop-filter: blur(8px);
      -webkit-backdrop-filter: blur(8px);
      transition: background 0.15s;
    }

    .icon-btn:active { background: var(--color-accent-dim); }

    /* ── Compass ── */
    #compass {
      position: fixed;
      top: 70px;
      right: 20px;
      z-index: 10;
      width: 56px;
      height: 56px;
      background: var(--color-surface);
      border: 1px solid var(--color-border);
      border-radius: 50%;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
    }

    .compass-needle {
      width: 18px;
      height: 18px;
      position: relative;
      animation: compassSway 8s ease-in-out infinite;
    }

    @keyframes compassSway {
      0%, 100% { transform: rotate(0deg); }
      25%  { transform: rotate(4deg); }
      75%  { transform: rotate(-3deg); }
    }

    .compass-needle::before,
    .compass-needle::after {
      content: '';
      position: absolute;
      left: 50%;
      transform: translateX(-50%);
      width: 0;
      height: 0;
    }

    .compass-needle::before {
      top: 0;
      border-left: 4px solid transparent;
      border-right: 4px solid transparent;
      border-bottom: 9px solid #ff4f4f;
    }

    .compass-needle::after {
      bottom: 0;
      border-left: 4px solid transparent;
      border-right: 4px solid transparent;
      border-top: 9px solid rgba(255,255,255,0.4);
    }

    .compass-label {
      font-size: 9px;
      font-weight: 700;
      letter-spacing: 0.08em;
      color: var(--color-text-secondary);
      margin-top: 3px;
    }

/* ── Detail card (bottom sheet) ── */
    #detail-card {
      position: fixed;
      bottom: 0;
      left: 0;
      right: 0;
      z-index: 20;
      background: var(--color-surface);
      border-top: 1px solid var(--color-border);
      border-radius: var(--radius-lg) var(--radius-lg) 0 0;
      backdrop-filter: blur(24px);
      -webkit-backdrop-filter: blur(24px);
      padding: 12px 20px 32px;
      transform: translateY(100%);
      transition: transform 0.35s cubic-bezier(0.32, 0.72, 0, 1);
    }

    #detail-card.visible { transform: translateY(0); }

    .card-handle {
      width: 36px;
      height: 4px;
      background: var(--color-border);
      border-radius: 2px;
      margin: 0 auto 16px;
    }

    .card-header {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      margin-bottom: 12px;
    }

    .card-title {
      font-size: 22px;
      font-weight: 700;
      letter-spacing: -0.5px;
      line-height: 1.15;
    }

    .card-subtitle {
      font-size: 13px;
      color: var(--color-text-secondary);
      margin-top: 3px;
    }

    .card-architect {
      font-size: 12px;
      color: var(--color-text-muted);
      margin-top: 4px;
    }

    .card-architect span {
      text-transform: uppercase;
      letter-spacing: 0.06em;
      font-size: 10px;
      font-weight: 600;
      margin-right: 5px;
    }

    .card-close {
      width: 30px;
      height: 30px;
      background: var(--color-surface-light);
      border: 1px solid var(--color-border);
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      flex-shrink: 0;
      margin-top: 2px;
    }

    .card-stats {
      display: flex;
      gap: 10px;
      margin-bottom: 14px;
    }

    .stat-item {
      flex: 1;
      background: var(--color-surface-light);
      border: 1px solid var(--color-border);
      border-radius: var(--radius-sm);
      padding: 10px 12px;
    }

    .stat-value {
      font-size: 17px;
      font-weight: 700;
      letter-spacing: -0.3px;
      color: var(--color-text-primary);
    }

    .stat-label {
      font-size: 10px;
      color: var(--color-text-muted);
      text-transform: uppercase;
      letter-spacing: 0.05em;
      margin-top: 2px;
    }

    .card-tags {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
      margin-bottom: 14px;
    }

    .tag {
      background: var(--color-tag-bg);
      border: 1px solid rgba(91, 143, 255, 0.25);
      border-radius: 20px;
      padding: 3px 10px;
      font-size: 11px;
      font-weight: 500;
      color: var(--color-accent);
    }

    .card-description {
      font-size: 13px;
      line-height: 1.55;
      color: var(--color-text-secondary);
      margin-bottom: 16px;
    }

    .card-actions {
      display: flex;
      gap: 10px;
    }

    .btn-primary {
      flex: 1;
      height: 44px;
      background: var(--color-accent);
      border-radius: var(--radius-md);
      border: none;
      color: #fff;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      transition: opacity 0.15s;
    }

    .btn-primary:active { opacity: 0.85; }

    .btn-secondary {
      width: 44px;
      height: 44px;
      background: var(--color-surface-light);
      border: 1px solid var(--color-border);
      border-radius: var(--radius-md);
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      transition: background 0.15s;
    }

    .btn-secondary:active { background: var(--color-accent-dim); }

/* ── Scan animation ring ── */
    #scan-ring {
      position: fixed;
      left: 50%;
      top: 42%;
      transform: translate(-50%, -50%);
      width: 160px;
      height: 160px;
      z-index: 3;
      pointer-events: none;
      opacity: 0.35;
    }

    .scan-circle {
      position: absolute;
      inset: 0;
      border-radius: 50%;
      border: 1px solid var(--color-accent);
      animation: scanExpand 3s ease-out infinite;
    }

    .scan-circle:nth-child(2) { animation-delay: 1s; }
    .scan-circle:nth-child(3) { animation-delay: 2s; }

    @keyframes scanExpand {
      0%   { transform: scale(0.3); opacity: 0.8; }
      100% { transform: scale(1.8); opacity: 0; }
    }

    /* ── Heading strip ── */
    #heading-strip {
      position: fixed;
      top: 130px;
      left: 50%;
      transform: translateX(-50%);
      z-index: 10;
      display: flex;
      align-items: center;
      gap: 0;
      pointer-events: none;
    }

    .heading-tick {
      font-size: 12px;
      font-weight: 700;
      letter-spacing: 0.1em;
      color: var(--color-text-secondary);
      padding: 0 8px;
    }

    .heading-tick.major {
      color: #fff;
      font-size: 13px;
    }

    .heading-center-mark {
      position: absolute;
      top: -4px;
      left: 50%;
      transform: translateX(-50%);
      width: 1px;
      height: calc(100% + 8px);
      background: var(--color-accent);
      opacity: 0.7;
    }

    .heading-wrapper {
      position: relative;
      overflow: hidden;
      padding: 8px 0;
      width: 25vw;
      background: rgba(10,10,20,0.5);
      border-radius: 999px;
      backdrop-filter: blur(8px);
      -webkit-backdrop-filter: blur(8px);
      border: 1px solid var(--color-border);
      mask-image: linear-gradient(to right, transparent 0%, black 20%, black 80%, transparent 100%);
      -webkit-mask-image: linear-gradient(to right, transparent 0%, black 20%, black 80%, transparent 100%);
    }

    .heading-track {
      display: flex;
      animation: headingJiggle 9s ease-in-out infinite;
    }

    @keyframes headingJiggle {
      0%, 100% { transform: translateX(calc(var(--jiggle-center, 0px) + 12px)); }
      50%       { transform: translateX(calc(var(--jiggle-center, 0px) - 12px)); }
    }

    /* ── Shutter button ── */
    #shutter-btn {
      position: fixed;
      bottom: 36px;
      left: 50%;
      transform: translateX(-50%);
      z-index: 15;
      width: 72px;
      height: 72px;
      border-radius: 50%;
      border: 6px solid rgba(255, 255, 255, 1);
      box-shadow: 0 0 0 2px rgba(255, 255, 255, 0.35);
      cursor: pointer;
      transition: transform 0.12s ease, border-color 0.12s ease;
    }

    #shutter-btn:active {
      transform: translateX(-50%) scale(0.93);
      border-color: rgba(255, 255, 255, 0.6);
    }

    /* ── Tooltip notification ── */
    #ar-toast {
      position: fixed;
      top: 160px;
      left: 50%;
      transform: translateX(-50%) translateY(-8px);
      z-index: 30;
      background: var(--color-surface);
      border: 1px solid var(--color-border);
      border-radius: var(--radius-md);
      padding: 9px 16px;
      font-size: 12px;
      color: var(--color-text-secondary);
      backdrop-filter: blur(16px);
      -webkit-backdrop-filter: blur(16px);
      pointer-events: none;
      opacity: 0;
      transition: opacity 0.2s, transform 0.2s;
      white-space: nowrap;
    }

    #ar-toast.show {
      opacity: 1;
      transform: translateX(-50%) translateY(0);
    }
  </style>
</head>
<body>

  <!-- Camera or placeholder background -->
  <video id="camera-feed" autoplay muted playsinline style="display:none;"></video>

  <div id="camera-placeholder">
    <img id="bg-photo" src="skyline-portrait.jpeg" alt="Chicago skyline" />
  </div>

  <!-- AR scan grid -->
  <div id="ar-grid"></div>

  <!-- Scan animation -->
  <div id="scan-ring">
    <div class="scan-circle"></div>
    <div class="scan-circle"></div>
    <div class="scan-circle"></div>
  </div>

  <!-- AR layer: SVG lines + pin labels + pin dots -->
  <svg id="ar-lines" style="position:fixed;inset:0;width:100%;height:100%;z-index:2;pointer-events:none;overflow:visible;"></svg>
  <div id="ar-layer"></div>


<!-- Toast -->
  <div id="ar-toast">Tap a pin to explore</div>

  <!-- Status bar -->
  <header id="status-bar">
    <div class="status-left">
      <div class="app-logo">Sky<span>line</span></div>
    </div>
    <div class="status-right">
      <div class="location-badge">
        <div class="location-dot"></div>
        Chicago, IL
      </div>
    </div>
  </header>



<!-- Heading strip -->
  <div id="heading-strip">
    <div class="heading-wrapper">
      <div class="heading-center-mark"></div>
      <div class="heading-track" id="heading-track"></div>
    </div>
  </div>

  <!-- Detail card -->
  <div id="detail-card">
    <div class="card-handle"></div>
    <div class="card-header">
      <div>
        <div class="card-title" id="card-title">Empire State Building</div>
        <div class="card-subtitle" id="card-subtitle">443 m · 0.4 km away · SE</div>
        <div class="card-architect" id="card-architect"><span>Architect</span>Shreve, Lamb & Harmon</div>
      </div>
      <div class="card-close" onclick="closeCard()">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="rgba(240,240,245,0.6)" stroke-width="2.5">
          <line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/>
        </svg>
      </div>
    </div>
    <div class="card-stats">
      <div class="stat-item">
        <div class="stat-value" id="stat-height">443 m</div>
        <div class="stat-label">Height</div>
      </div>
      <div class="stat-item">
        <div class="stat-value" id="stat-floors">102</div>
        <div class="stat-label">Floors</div>
      </div>
      <div class="stat-item">
        <div class="stat-value" id="stat-year">1931</div>
        <div class="stat-label">Built</div>
      </div>
    </div>
    <div class="card-tags" id="card-tags"></div>
    <div class="card-description" id="card-description">
      An iconic Art Deco skyscraper in Midtown Manhattan offering panoramic views from its observation decks.
    </div>
    <div class="card-actions">
      <button class="btn-primary">Navigate</button>
    </div>
  </div>

  <!-- Shutter button -->
  <div id="shutter-btn"></div>

  <script>
    const BUILDINGS = [
      {
        id: 'aon',
        name: 'Aon Center',
        address: '200 E Randolph St',
        height: '346 m / 1,136 ft',
        floors: '83',
        year: '1973',
        distance: '0.3 km',
        direction: 'W',
        architect: 'Edward Durell Stone',
        tags: ['Office', 'Neo-Gothic', 'Chicago 4th Tallest'],
        description: 'Originally the Standard Oil Building, its white Carrara marble cladding had to be entirely replaced with Mount Airy granite in the 1990s — one of the most expensive facade replacements in history.',
        dotX: 21.4, dotY: 38.8, labelX: 12, labelY: 30,
      },
      {
        id: '340park',
        name: '340 on the Park',
        address: '340 E Randolph St',
        height: '205 m / 672 ft',
        floors: '62',
        year: '2007',
        distance: '0.5 km',
        direction: 'W',
        architect: 'Solomon Cordwell Buenz',
        tags: ['Residential', 'Millennium Park Views', 'Luxury'],
        description: 'A slender residential tower overlooking Millennium Park and Lake Michigan. One of the tallest all-residential buildings in Chicago at the time of its completion.',
        dotX: 40, dotY: 44, labelX: 35, labelY: 37,
      },
      {
        id: 'stregis',
        name: 'St. Regis Chicago',
        address: '363 E Wacker Dr',
        height: '363 m / 1,191 ft',
        floors: '101',
        year: '2021',
        distance: '0.2 km',
        direction: 'W',
        architect: 'Jeanne Gang / Studio Gang',
        tags: ['Hotel', 'Residential', 'Chicago 3rd Tallest'],
        description: 'Formerly Vista Tower, designed by Jeanne Gang of Studio Gang Architects. Its undulating glass facade shifts color with the sky and light. Chicago\'s third tallest building and one of the most distinctive supertalls in the world.',
        dotX: 51, dotY: 39, labelX: 49, labelY: 30,
      },
      {
        id: 'northharbor',
        name: 'North Harbor Tower',
        address: '175 N Harbor Dr',
        height: '169 m / 556 ft',
        floors: '55',
        year: '1988',
        distance: '0.4 km',
        direction: 'NW',
        architect: 'Solomon Cordwell Buenz',
        tags: ['Residential', 'Harbor Views'],
        description: 'A 55-story residential tower on the inner harbor, offering views across Monroe Harbor and Lake Michigan toward the Illinois dunes on clear days.',
        dotX: 71, dotY: 45, labelX: 67, labelY: 37,
      },
      {
        id: 'harborpoint',
        name: 'Harbor Point',
        address: '155 N Harbor Dr',
        height: '~165 m / ~540 ft',
        floors: '54',
        year: '1975',
        distance: '0.5 km',
        direction: 'NW',
        architect: 'Ezra Gordon & Jack M. Levin',
        tags: ['Residential', 'Harbor Views', 'Brutalist'],
        description: 'A 54-story residential tower completed in 1975 at the tip of the Streeterville peninsula, with panoramic exposure to the lake on three sides.',
        dotX: 78, dotY: 45, labelX: 82, labelY: 30,
      },
    ];

    let activeBuilding = null;

    function buildPins() {
      const layer  = document.getElementById('ar-layer');
      const svgEl  = document.getElementById('ar-lines');

      BUILDINGS.forEach(b => {
        // Label — bottom-center anchored at (labelX%, labelY%)
        const label = document.createElement('div');
        label.className = 'ar-pin-label';
        label.id = 'label-' + b.id;
        label.style.cssText = `position:absolute;left:${b.labelX}%;top:${b.labelY}%;transform:translate(-50%,-100%);cursor:pointer;`;
        label.innerHTML = `
          <div class="ar-pin-name">${b.name}</div>
          <div class="ar-pin-height">${b.height.split(' / ')[0]}</div>
        `;
        label.addEventListener('click', () => openCard(b));
        layer.appendChild(label);

        // Dot — center anchored at (dotX%, dotY%)
        const dot = document.createElement('div');
        dot.className = 'ar-pin-dot';
        dot.id = 'dot-' + b.id;
        dot.style.cssText = `position:absolute;left:${b.dotX}%;top:${b.dotY}%;transform:translate(-50%,-50%);cursor:pointer;`;
        dot.addEventListener('click', () => openCard(b));
        layer.appendChild(dot);

        // SVG connector line from label bottom-center to dot center
        const line = document.createElementNS('http://www.w3.org/2000/svg', 'line');
        line.id = 'line-' + b.id;
        line.setAttribute('x1', b.labelX + '%');
        line.setAttribute('y1', b.labelY + '%');
        line.setAttribute('x2', b.dotX   + '%');
        line.setAttribute('y2', b.dotY   + '%');
        line.setAttribute('stroke', 'rgba(91,143,255,0.55)');
        line.setAttribute('stroke-width', '1');
        line.setAttribute('stroke-dasharray', '3 3');
        svgEl.appendChild(line);
      });
    }

    function openCard(building) {
      activeBuilding = building;
      document.getElementById('card-title').textContent = building.name;
      document.getElementById('card-subtitle').textContent =
        `${building.height} · ${building.distance} away · ${building.direction}`;
      document.getElementById('stat-height').textContent = building.height;
      document.getElementById('stat-floors').textContent = building.floors;
      document.getElementById('stat-year').textContent   = building.year;
      document.getElementById('card-description').textContent = building.description;
      document.getElementById('card-architect').innerHTML = `<span>Architect</span>${building.architect}`;

      const tagsEl = document.getElementById('card-tags');
      tagsEl.innerHTML = building.tags.map(t => `<span class="tag">${t}</span>`).join('');

      document.getElementById('detail-card').classList.add('visible');
    }

    function closeCard() {
      document.getElementById('detail-card').classList.remove('visible');
      activeBuilding = null;
    }



    function buildHeadingStrip() {
      const ticks = ['320', '330', '340', '350', 'N', '10', '20', '30', '40'];
      const track = document.getElementById('heading-track');
      ticks.forEach(t => {
        const span = document.createElement('span');
        span.className = 'heading-tick' + (t === 'N' ? ' major' : '');
        span.textContent = t;
        if (t === 'N') span.id = 'heading-n';
        track.appendChild(span);
      });
      requestAnimationFrame(() => {
        const wrapper = track.parentElement;
        const nEl = document.getElementById('heading-n');
        if (nEl && wrapper) {
          const offset = nEl.offsetLeft + nEl.offsetWidth / 2 - wrapper.offsetWidth / 2;
          track.style.setProperty('--jiggle-center', `-${offset}px`);
        }
      });
    }

let toastTimer;
    function showToast(msg) {
      const el = document.getElementById('ar-toast');
      el.textContent = msg;
      el.classList.add('show');
      clearTimeout(toastTimer);
      toastTimer = setTimeout(() => el.classList.remove('show'), 2200);
    }

    // Swipe down to close card
    let touchStartY = 0;
    document.getElementById('detail-card').addEventListener('touchstart', e => {
      touchStartY = e.touches[0].clientY;
    }, { passive: true });
    document.getElementById('detail-card').addEventListener('touchend', e => {
      if (e.changedTouches[0].clientY - touchStartY > 60) closeCard();
    }, { passive: true });

// Init
    buildPins();
    buildHeadingStrip();
    setTimeout(() => showToast('Tap a building pin to explore'), 1200);
  </script>
</body>
</html>
